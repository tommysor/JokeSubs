name: CI

on:
    push:
        branches:
            - main
            - "copilot/**"
    pull_request:

jobs:
    acceptance-tests:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Pre-pull Cosmos DB emulator image
              run: docker pull mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:vnext-preview

            - name: Restore dependencies
              run: dotnet restore

            - name: Build acceptance tests
              run: dotnet build JokeSubs.AcceptanceTests --no-restore

            - name: Install Playwright browsers
              run: pwsh JokeSubs.AcceptanceTests/bin/Debug/net10.0/playwright.ps1 install chromium --with-deps

            - name: Run acceptance tests
              run: dotnet test JokeSubs.AcceptanceTests --no-build --logger "github" --logger "console;verbosity=normal"
